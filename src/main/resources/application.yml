# 项目基础配置
spring:
  application:
    # 项目名称
    name: spring-mybatis-demo01

  # 数据库连接配置
  datasource:
    # MySQL 驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver

    # 数据库连接地址
    # localhost:3306 表示本机 MySQL 的 3306 端口
    # itcast 表示要连接的数据库名
    url: jdbc:mysql://localhost:3306/itcast

    # 数据库用户名
    username: root

    # 数据库密码
    # 密码中有特殊字符时，建议加双引号
    password: "2007311@Lyl"

  # 文件上传配置
  servlet:
    multipart:
      # 单个上传文件最大大小
      max-file-size: 10MB

      # 单次请求最大大小：多个文件 + 其他表单数据总大小
      max-request-size: 100MB


# MyBatis 配置
mybatis:
  configuration:
    # 打印 MyBatis 执行的 SQL 语句，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

    # 开启数据库字段下划线转 Java 驼峰命名
    # 例如：create_time -> createTime
    map-underscore-to-camel-case: true


aliyun:
  oss:
    endpoint: https://oss-cn-hangzhou.aliyuncs.com
    bucketName: 你的bucket名
    accessKeyId: ${ALIYUN_ACCESS_KEY_ID}
    accessKeySecret: ${ALIYUN_ACCESS_KEY_SECRET}